<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°18</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°18</h1>
  <p class="subtitle">The Deal Brief · 06 July 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Quel est le montant investi par Blackstone dans son nouveau fonds de crédit privé ?", "options": ["A. 1 milliard de dollars", "B. 5 milliards de dollars", "C. 10 milliards de dollars", "D. 20 milliards de dollars"], "correct": 2, "explanation": "Selon le texte, Blackstone a annoncé un nouveau fonds de crédit privé doté de 10 milliards de dollars. Les autres options sont incorrectes car elles ne correspondent pas au montant mentionné dans le texte."}, {"question": "Quelle est la méthode de valorisation d'entreprise abordée dans le chapitre en cours ?", "options": ["A. DCF (Discounted Cash Flow)", "B. Trading Comparables", "C. Analyse de ratios financiers", "D. Évaluation des actifs"], "correct": 1, "explanation": "Le chapitre en cours est consacré aux méthodes de valorisation d'entreprise, en particulier aux Trading Comparables. Les autres options sont incorrectes car elles ne correspondent pas à la méthode mentionnée dans le texte."}, {"question": "Quels sont les facteurs qui contribuent actuellement aux turbulences sur les marchés financiers ?", "options": ["A. L'inflation et les taux d'intérêt", "B. Les incertitudes géopolitiques et la croissance économique", "C. L'inflation, les taux d'intérêt et les incertitudes géopolitiques", "D. La croissance économique et les taux d'intérêt"], "correct": 2, "explanation": "Selon le texte, les marchés financiers sont actuellement confrontés à des turbulences dues à des facteurs tels que l'inflation, les taux d'intérêt et les incertitudes géopolitiques. Les autres options sont incorrectes car elles ne mentionnent pas tous les facteurs mentionnés dans le texte."}, {"question": "Quel est l'objectif de la sélection des pairs dans la méthode de valorisation par Trading Comparables ?", "options": ["A. De sélectionner des entreprises similaires en termes de taille et de secteur", "B. De sélectionner des entreprises avec des rendements élevés", "C. De sélectionner des entreprises avec des coûts de production élevés", "D. De sélectionner des entreprises avec des dettes élevées"], "correct": 0, "explanation": "La sélection des pairs est cruciale dans la méthode de valorisation par Trading Comparables, car elle doit refléter les caractéristiques de l'entreprise évaluée, telles que son secteur, sa taille et son niveau de marge. Les autres options sont incorrectes car elles ne correspondent pas à l'objectif de la sélection des pairs mentionné dans le texte."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
