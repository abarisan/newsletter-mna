<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°23</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°23</h1>
  <p class="subtitle">The Deal Brief · 13 July 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Quel est le montant de la transaction entre Paramount et Warner Bros. qui pourrait être bloquée par les autorités américaines ?", "options": ["A. 10 milliards de dollars", "B. 50 milliards de dollars", "C. 111 milliards de dollars", "D. 200 milliards de dollars"], "correct": 2, "explanation": "La bonne réponse est C. 111 milliards de dollars, car c'est le montant indiqué dans la newsletter comme étant la valorisation du deal entre Paramount et Warner Bros."}, {"question": "Quelles sont les méthodes de valorisation dans les opérations de fusions et acquisitions abordées dans le chapitre du jour ?", "options": ["A. Seulement la méthode des flux de trésorerie disponible (FCF)", "B. Seulement la méthode du multiple de l'EBITDA", "C. La méthode des flux de trésorerie disponible (FCF), la méthode du multiple de l'EBITDA et la méthode du discounted cash flow (DCF)", "D. Aucune de ces méthodes"], "correct": 2, "explanation": "La bonne réponse est C, car les trois méthodes de valorisation sont mentionnées dans le chapitre du jour comme étant des méthodes utilisées dans les opérations de fusions et acquisitions."}, {"question": "Qu'est-ce que les synergies dans le contexte des fusions et acquisitions ?", "options": ["A. Les coûts associés à la fusion de deux entreprises", "B. Les avantages qui résultent de la combinaison de deux entreprises, tels que la réduction des coûts ou l'augmentation des revenus", "C. Les changements dans la structure de l'entreprise après une acquisition", "D. Les risques liés à une fusion"], "correct": 1, "explanation": "La bonne réponse est B, car les synergies font référence aux avantages qui résultent de la combinaison de deux entreprises, tels que la réduction des coûts, l'augmentation des revenus ou l'amélioration de l'efficacité."}, {"question": "Comment la tension dans le Golfe affecte-t-elle les marchés financiers ?", "options": ["A. Elle a un impact négatif sur les prix du pétrole", "B. Elle a un impact positif sur les marchés financiers", "C. Elle n'a aucun impact sur les marchés financiers", "D. Elle entraîne une augmentation des prix du pétrole en raison des craintes concernant la sécurité de l'approvisionnement énergétique"], "correct": 3, "explanation": "La bonne réponse est D, car la tension dans le Golfe a un impact direct sur les marchés financiers, en particulier les prix du pétrole, qui augmentent en raison des craintes concernant la sécurité de l'approvisionnement énergétique."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
