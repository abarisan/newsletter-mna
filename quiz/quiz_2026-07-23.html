<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°31</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°31</h1>
  <p class="subtitle">The Deal Brief · 23 July 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Quel est l'exemple d'application des principes de la balance sheet mentionné dans la newsletter ?", "options": ["A. La fusion de deux entreprises", "B. L'acquisition de l'oléoduc par TotalEnergies", "C. La création d'un nouveau produit", "D. La réduction des coûts opérationnels"], "correct": 1, "explanation": "La bonne réponse est B. L'acquisition de l'oléoduc par TotalEnergies, car elle est explicitement mentionnée dans la newsletter comme un exemple d'application des principes de la balance sheet. Les autres options ne sont pas mentionnées dans la newsletter et ne sont donc pas correctes."}, {"question": "Qu'est-ce que la balance sheet ?", "options": ["A. Un document financier qui présente les revenus et les dépenses d'une entreprise", "B. Un outil de prévision des ventes", "C. Une feuille de route financière qui présente les actifs, les passifs et les capitaux propres d'une entreprise à un moment donné", "D. Un rapport d'audit"], "correct": 2, "explanation": "La bonne réponse est C. Une feuille de route financière qui présente les actifs, les passifs et les capitaux propres d'une entreprise à un moment donné, car c'est la définition exacte de la balance sheet mentionnée dans la newsletter. Les autres options ne sont pas correctes car elles ne décrivent pas avec précision la balance sheet."}, {"question": "Quels sont les deux principaux composants de la balance sheet ?", "options": ["A. Les actifs et les passifs", "B. Les revenus et les dépenses", "C. Les capitaux propres et les dettes", "D. Les investissements et les actifs"], "correct": 0, "explanation": "La bonne réponse est A. Les actifs et les passifs, car la balance sheet se compose de deux côtés : les actifs (les biens et les ressources que possède l'entreprise) et les passifs (les dettes ou obligations financières de l'entreprise). Les autres options ne sont pas correctes car elles ne représentent pas avec précision les deux principaux composants de la balance sheet."}, {"question": "Quel est l'impact de la géopolitique sur les marchés financiers mentionné dans la newsletter ?", "options": ["A. La géopolitique n'a pas d'impact sur les marchés financiers", "B. La géopolitique affecte uniquement les entreprises du secteur de l'énergie", "C. La géopolitique affecte les décisions d'investissement et les stratégies des entreprises", "D. La géopolitique n'affecte que les marchés boursiers"], "correct": 2, "explanation": "La bonne réponse est C. La géopolitique affecte les décisions d'investissement et les stratégies des entreprises, car la newsletter mentionne que la récente escalade des tensions géopolitiques a des implications directes sur les marchés financiers et affecte les décisions d'investissement et les stratégies des entreprises comme TotalEnergies. Les autres options ne sont pas correctes car elles ne représentent pas avec précision l'impact de la géopolitique sur les marchés financiers mentionné dans la newsletter."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
