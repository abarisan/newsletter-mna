<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°27</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°27</h1>
  <p class="subtitle">The Deal Brief · 17 July 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Quel est le montant de la prime payée par l'acteur chinois pour acquérir Moonshot ?", "options": ["A. 10% de la valorisation de Moonshot", "B. 20% de la valorisation de Moonshot", "C. 30% de la valorisation de Moonshot", "D. 40% de la valorisation de Moonshot"], "correct": 1, "explanation": "La bonne réponse est 20% de la valorisation de Moonshot, car selon les sources proches du dossier, l'acteur chinois a payé une prime de 20% par rapport à la valorisation de Moonshot lors de sa dernière levée de fonds."}, {"question": "Quelles sont les méthodes de valorisation les plus courantes utilisées dans un deal d'acquisition ?", "options": ["A. Seulement la méthodologie DCF", "B. Seulement la méthodologie des multiples", "C. La méthodologie DCF et la méthodologie des multiples", "D. Aucune des deux"], "correct": 2, "explanation": "La bonne réponse est la méthodologie DCF et la méthodologie des multiples, car ces deux méthodes sont couramment utilisées pour évaluer la valeur d'une entreprise cible dans un deal d'acquisition."}, {"question": "Quel est l'impact des tensions géopolitiques sur le marché M&A ?", "options": ["A. Les tensions géopolitiques réduisent l'incertitude pour le marché M&A", "B. Les tensions géopolitiques n'ont aucun impact sur le marché M&A", "C. Les tensions géopolitiques accroissent l'incertitude pour le marché M&A", "D. Les tensions géopolitiques stimulent les transactions M&A"], "correct": 2, "explanation": "La bonne réponse est que les tensions géopolitiques accroissent l'incertitude pour le marché M&A, car les récentes tensions entre les États-Unis et la Chine ont créé un environnement instable pour les transactions M&A."}, {"question": "Quel est le rôle de l'acheteur dans la structuration d'une transaction d'acquisition ?", "options": ["A. L'acheteur doit seulement payer la valorisation de l'entreprise cible", "B. L'acheteur doit décider de la stratégie de l'acquisition", "C. L'acheteur doit décider de la structuration de la transaction", "D. L'acheteur n'a aucun rôle dans la structuration de la transaction"], "correct": 2, "explanation": "La bonne réponse est que l'acheteur doit décider de la stratégie de l'acquisition, car la structuration de la transaction est un aspect important d'un deal d'acquisition et l'acheteur doit prendre des décisions stratégiques pour réussir l'acquisition."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
