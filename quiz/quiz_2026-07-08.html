<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°20</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°20</h1>
  <p class="subtitle">The Deal Brief · 08 July 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Quel est le nom de la startup américaine de technologie qui a fait l'objet d'un article dans le Financial Times le 8 juillet 2026 ?", "options": ["A. Palantir", "B. Google", "C. Amazon", "D. Facebook"], "correct": 0, "explanation": "La bonne réponse est A. Palantir, car c'est le nom de la startup mentionnée dans l'article du Financial Times. Les autres options sont des noms de sociétés différentes et ne sont pas liées à l'article."}, {"question": "Qu'est-ce que le WACC (Weighted Average Cost of Capital) en finance d'entreprise ?", "options": ["A. Le coût moyen pondéré du capital d'une entreprise", "B. Le coût de la dette", "C. Le coût des capitaux propres", "D. Le retour sur investissement"], "correct": 0, "explanation": "La bonne réponse est A. Le coût moyen pondéré du capital d'une entreprise, car c'est la définition exacte du WACC. Les autres options sont des concepts liés, mais ne sont pas la définition du WACC."}, {"question": "Quelle est la formule du WACC ?", "options": ["A. WACC = (D / (D + E)) x Rd + (E / (D + E)) x Re", "B. WACC = (D / (D + E)) x Re + (E / (D + E)) x Rd", "C. WACC = D + E", "D. WACC = Rd + Re"], "correct": 0, "explanation": "La bonne réponse est A. WACC = (D / (D + E)) x Rd + (E / (D + E)) x Re, car c'est la formule exacte du WACC. Les autres options sont des formules incorrectes ou incomplètes."}, {"question": "Pourquoi les sanctions économiques imposées par les États-Unis à l'Iran affectent-elles directement le coût de la dette pour les entreprises iraniennes ?", "options": ["A. Parce que les sanctions augmentent la dette des entreprises iraniennes", "B. Parce que les sanctions réduisent la debt des entreprises iraniennes", "C. Parce que les sanctions augmentent le coût de la dette pour les entreprises iraniennes", "D. Parce que les sanctions n'ont pas d'impact sur le coût de la dette pour les entreprises iraniennes"], "correct": 2, "explanation": "La bonne réponse est C. Parce que les sanctions augmentent le coût de la dette pour les entreprises iraniennes, car les sanctions économiques peuvent rendre plus difficile et coûteux pour les entreprises iraniennes d'accéder au crédit. Les autres options sont incorrectes car les sanctions ne réduisent pas la dette des entreprises iraniennes et n'ont pas d'impact nul sur le coût de la dette."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
