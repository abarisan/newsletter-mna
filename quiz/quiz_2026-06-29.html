<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°13</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°13</h1>
  <p class="subtitle">The Deal Brief · 29 June 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Quel est l'objectif principal du plan de restructuration de Volkswagen ?", "options": ["A. Réduire les coûts de production", "B. Financer la transition vers les véhicules électriques", "C. Augmenter la production de véhicules diesel", "D. Développer de nouveaux marchés"], "correct": 1, "explanation": "Le plan de restructuration de Volkswagen vise à financer la transition de l'entreprise vers les véhicules électriques, comme indiqué dans l'article. Les autres options ne sont pas directement liées à l'objectif principal du plan de restructuration."}, {"question": "Quelle est la différence clé entre les méthodes de comptabilisation des inventaires LIFO et FIFO ?", "options": ["A. LIFO suppose que les premiers articles entrés en stock sont les premiers à être vendus, tandis que FIFO suppose que les derniers articles entrés en stock sont les premiers à être vendus", "B. LIFO suppose que les derniers articles entrés en stock sont les premiers à être vendus, tandis que FIFO suppose que les premiers articles entrés en stock sont les premiers à être vendus", "C. LIFO est utilisée pour les produits périssables, tandis que FIFO est utilisée pour les produits non périssables", "D. LIFO est utilisée pour les petites entreprises, tandis que FIFO est utilisée pour les grandes entreprises"], "correct": 1, "explanation": "La différence clé entre LIFO et FIFO repose sur l'hypothèse concernant l'ordre dans lequel les articles sont vendus. LIFO suppose que les derniers articles entrés en stock sont les premiers à être vendus, tandis que FIFO suppose que les premiers articles entrés en stock sont les premiers à être vendus."}, {"question": "Quel est l'impact potentiel de la restructuration de Volkswagen sur le marché automobile ?", "options": ["A. Réduction de la concurrence", "B. Augmentation de la concurrence", "C. Stabilisation du marché", "D. Disparition du marché"], "correct": 1, "explanation": "La restructuration de Volkswagen pourrait conduire à la vente de certaines filiales, ce qui pourrait augmenter la concurrence sur le marché automobile. Cela pourrait avoir des conséquences sur les autres constructeurs automobiles, qui devraient s'adapter à ce nouveau paysage concurrentiel."}, {"question": "Pourquoi la gestion des inventaires est-elle cruciale pour les entreprises ?", "options": ["A. Pour réduire les coûts de production", "B. Pour augmenter les ventes", "C. Pour minimiser les pertes et maximiser les profits", "D. Pour développer de nouveaux produits"], "correct": 2, "explanation": "La gestion des inventaires est cruciale pour les entreprises car elle peut aider à minimiser les pertes et à maximiser les profits. En gérant efficacement leurs inventaires, les entreprises peuvent éviter les surstocks et les sous-stocks, ce qui peut avoir un impact significatif sur leurs résultats financiers."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
