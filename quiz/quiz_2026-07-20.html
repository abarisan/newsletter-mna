<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°28</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°28</h1>
  <p class="subtitle">The Deal Brief · 20 July 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Quel est l'impact de la crise irano-américaine sur les cours de l'or noir ?", "options": ["A. Le cours du pétrole a baissé en dessous de 80 dollars le baril", "B. Le cours du pétrole est resté stable autour de 80 dollars le baril", "C. Le cours du pétrole a dépassé les 90 dollars le baril", "D. Le cours du pétrole a baissé à 70 dollars le baril"], "correct": 2, "explanation": "Selon l'article du Financial Times, le cours du pétrole a dépassé les 90 dollars le baril en raison de la crise irano-américaine. Cela montre que la crise a un impact direct sur les prix de l'énergie."}, {"question": "Quelle est la différence principale entre les IFRS et les GAAP ?", "options": ["A. Les IFRS sont utilisés aux États-Unis, tandis que les GAAP sont utilisés en Europe", "B. Les IFRS utilisent une approche plus rules-based, tandis que les GAAP utilisent une approche plus principes-based", "C. Les IFRS utilisent une approche plus principes-based, tandis que les GAAP utilisent une approche plus rules-based", "D. Les IFRS et les GAAP sont identiques et utilisent la même approche"], "correct": 2, "explanation": "Les IFRS utilisent une approche plus principes-based, tandis que les GAAP utilisent une approche plus rules-based. Cela signifie que les IFRS se concentrent sur les principes généraux, tandis que les GAAP se concentrent sur les règles spécifiques."}, {"question": "Quel est l'impact de la crise irano-américaine sur les valorisations des entreprises du secteur énergétique ?", "options": ["A. Les valorisations des entreprises du secteur énergétique ont baissé", "B. Les valorisations des entreprises du secteur énergétique sont restées stables", "C. Les valorisations des entreprises du secteur énergétique ont augmenté", "D. Les valorisations des entreprises du secteur énergétique ont disparu"], "correct": 2, "explanation": "Selon l'article, le cours de l'action de TotalEnergies a augmenté de 2% suite à l'annonce de la reprise des hostilités. Cela montre que la crise irano-américaine a un impact direct sur les valorisations des entreprises du secteur énergétique."}, {"question": "Quel est l'impact potentiel de la crise irano-américaine sur la croissance économique mondiale ?", "options": ["A. La crise irano-américaine pourraient stimuler la croissance économique mondiale", "B. La crise irano-américaine n'a pas d'impact sur la croissance économique mondiale", "C. La crise irano-américaine pourrait freiner la croissance économique mondiale", "D. La crise irano-américaine pourraient faire disparaître la croissance économique mondiale"], "correct": 2, "explanation": "Selon l'article du Wall Street Journal, les prix de l'or noir pourraient augmenter encore en raison de la crise irano-américaine, ce qui pourrait freiner la croissance économique. Cela montre que la crise a un impact négatif potentiel sur la croissance économique mondiale."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
