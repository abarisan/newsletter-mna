<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°07</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°07</h1>
  <p class="subtitle">The Deal Brief · 16 June 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Quelle est la valorisation potentielle de KNDS lors de son introduction en Bourse ?", "options": ["A. 10 Md€", "B. 20 Md€", "C. 300 Md$", "D. 50 Md€"], "correct": 1, "explanation": "Le Financial Times révèle que KNDS, né de la fusion de Nexter et Krauss-Maffei Wegmann, se prépare à une IPO à une valorisation pouvant atteindre 20 Md€. Le chiffre de 300 Md$ correspond au fonds d'incitation lié à l'accord USA-Iran, pas à la valorisation de KNDS. Les autres montants ne sont pas mentionnés."}, {"question": "Comment se définit le working capital (BFR) opérationnel ?", "options": ["A. La différence entre la trésorerie et la dette financière court terme", "B. La somme des actifs courants et des passifs courants y compris la trésorerie", "C. La différence entre actifs courants d'exploitation (créances + stocks) et passifs courants d'exploitation (dettes fournisseurs + autres dettes d'exploitation), en excluant la trésorerie et la dette financière court terme", "D. La différence entre le résultat net et les dividendes versés"], "correct": 2, "explanation": "Le BFR opérationnel correspond à la différence entre les actifs courants d'exploitation (créances clients + stocks) et les passifs courants d'exploitation (dettes fournisseurs + autres dettes d'exploitation). On exclut explicitement la trésorerie et la dette financière court terme, qui ne relèvent pas de l'exploitation. Les autres réponses confondent BFR avec d'autres notions (trésorerie nette, résultat distribué)."}, {"question": "Pourquoi le BFR est-il un poste particulièrement piégeux en entretien selon le cours ?", "options": ["A. Parce qu'il n'apparaît dans aucun des états financiers", "B. Parce qu'il vit à la fois au bilan (en niveau) et dans le tableau de flux (en variation)", "C. Parce qu'il est toujours négatif pour une entreprise industrielle", "D. Parce qu'il se calcule uniquement à partir du compte de résultat"], "correct": 1, "explanation": "Le cours souligne que le BFR est le poste le plus mal compris car il existe simultanément au bilan (en niveau) et dans le tableau de flux de trésorerie (en variation). Mal manier cette distinction est éliminatoire. Le BFR apparaît bien dans les états financiers (A faux), n'est pas systématiquement négatif (C faux) et ne se calcule pas via le compte de résultat (D faux)."}, {"question": "Selon la section Macro, à quelle condition est lié le fonds d'incitation de 300 Md$ dans l'accord USA-Iran ?", "options": ["A. À la baisse durable du brut", "B. À l'entrée de Berlin au capital de KNDS", "C. À la réouverture du détroit d'Ormuz", "D. À la fusion de Nexter et Krauss-Maffei Wegmann"], "correct": 2, "explanation": "Le fonds d'incitation pouvant atteindre 300 Md$ est conditionné à la réouverture du détroit d'Ormuz. La baisse du brut est une conséquence de l'accord et non sa condition (A faux). L'entrée de Berlin au capital et la fusion concernent le dossier KNDS, qui n'a aucun lien avec le fonds d'incitation iranien (B et D faux)."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
