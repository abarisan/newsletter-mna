<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°02</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°02</h1>
  <p class="subtitle">The Deal Brief · 08 June 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Quel est le montant total du LBO d'Electronic Arts par le consortium PIF / Silver Lake / Affinity ?", "options": ["A. 35 Md$", "B. 45 Md$", "C. 55 Md$", "D. 65 Md$"], "correct": 2, "explanation": "Le rachat d'Electronic Arts s'élève à 55 Md$, ce qui en fait le plus gros rachat avec effet de levier (LBO) de l'histoire. Les autres montants sont incorrects et ne correspondent pas au chiffre annoncé dans la newsletter."}, {"question": "Quels sont les trois membres du consortium qui réalisent le rachat d'Electronic Arts ?", "options": ["A. PIF, Blackstone et KKR", "B. PIF, Silver Lake et Affinity", "C. Silver Lake, Vista et Affinity", "D. PIF, Silver Lake et Carlyle"], "correct": 1, "explanation": "Le consortium réunit le Public Investment Fund (PIF) saoudien, Silver Lake et Affinity. Les autres options mélangent des noms de fonds qui ne font pas partie de cette opération précise."}, {"question": "Dans un LBO, où se loge concrètement la dette d'acquisition ?", "options": ["A. Dans le bilan du fonds acquéreur", "B. Dans le bilan de la cible, remboursée via ses cash-flows", "C. Dans un véhicule externe sans lien avec la cible", "D. Elle est répartie entre les actionnaires individuels"], "correct": 1, "explanation": "La caractéristique centrale d'un LBO est que la dette d'acquisition se loge dans le bilan de la cible et se rembourse grâce à ses propres cash-flows. C'est précisément ce mécanisme qui doit être décortiqué mercredi. Les autres options décrivent des structures qui ne correspondent pas au fonctionnement réel d'un LBO."}, {"question": "Parmi ces éléments, lequel sera analysé mercredi pour modéliser le levier de ce LBO ?", "options": ["A. Le calcul du TRI du consortium à la sortie", "B. La politique de dividendes des actionnaires minoritaires", "C. La stratégie marketing d'Electronic Arts", "D. Le cours de bourse historique sur 10 ans"], "correct": 0, "explanation": "La newsletter annonce que mercredi seront décortiqués les sources & uses, le ratio dette/EBITDA d'entrée, le déleveraging année par année et le calcul du TRI (taux de rendement interne) du consortium à la sortie. Les autres options ne sont pas mentionnées comme éléments de la modélisation du levier."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
