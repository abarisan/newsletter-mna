<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°08</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°08</h1>
  <p class="subtitle">The Deal Brief · 17 June 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Qu'est-ce que le goodwill (survaleur) en comptabilité d'acquisition ?", "options": ["A. La valeur totale des actifs corporels de la cible", "B. L'excédent du prix payé par rapport à la juste valeur des actifs nets identifiables de la cible", "C. Le montant de dette utilisé pour financer l'acquisition", "D. La prime versée uniquement aux actionnaires dirigeants"], "correct": 1, "explanation": "Le goodwill est un actif incorporel égal au prix payé moins la juste valeur des actifs nets identifiables (actifs - passifs réévalués). Il représente ce qu'on paie « en plus » : marque, base clients, synergies, capital humain. L'option A est fausse car le goodwill est justement ce qui dépasse les actifs identifiables. L'option C confond goodwill et financement par dette. L'option D réduit à tort le goodwill à une prime versée aux dirigeants."}, {"question": "Dans le LBO d'Electronic Arts, quelle est approximativement la valeur d'entreprise de la transaction ?", "options": ["A. 20 Md$", "B. 33 Md$", "C. 36 Md$", "D. 55 Md$"], "correct": 3, "explanation": "Le consortium (Silver Lake, PIF, Affinity Partners) rachète EA à environ 55 Md$ de valeur d'entreprise. Le chiffre de 20 Md$ (A) correspond à la dette (term loan + senior notes), 36 Md$ (C) à l'equity, et 33 Md$ (B) à la prime de goodwill qui va gonfler le bilan."}, {"question": "Comment l'acquisition d'Electronic Arts est-elle financée par le consortium ?", "options": ["A. ~36 Md$ d'equity et ~20 Md$ de dette", "B. ~20 Md$ d'equity et ~36 Md$ de dette", "C. 100 % par dette senior", "D. ~55 Md$ d'equity uniquement"], "correct": 0, "explanation": "La transaction est financée par environ 36 Md$ d'equity et environ 20 Md$ de dette (term loan + senior notes). L'option B inverse les montants. L'option C est fausse car un LBO mélange dette et capitaux propres (et 100 % dette serait irréaliste ici). L'option D ignore complètement la composante dette, pourtant centrale dans un LBO."}, {"question": "Selon les sources macro citées, quelle décision la Fed présidée par Kevin Warsh devait-elle prendre lors de la réunion de juin 2026 ?", "options": ["A. Baisser fortement les taux pour stimuler le LBO", "B. Maintenir ses taux inchangés", "C. Augmenter les taux de 50 points de base", "D. Suspendre toute politique monétaire"], "correct": 1, "explanation": "D'après le NYT DealBook, la Fed devait maintenir ses taux inchangés lors de la première réunion présidée par Kevin M. Warsh, ce qui s'accompagne du retour de l'« US exceptionalism » et tend le marché du LBO. Les options A et C décrivent des mouvements de taux (baisse ou hausse) qui contredisent le maintien annoncé. L'option D est absurde : la Fed continue d'exercer sa politique monétaire en décidant justement de ne pas bouger les taux."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
