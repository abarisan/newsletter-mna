<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°32</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°32</h1>
  <p class="subtitle">The Deal Brief · 24 July 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Quel est le prix d'acquisition de Beyond par Buy Buy Baby ?", "options": ["A. 100 millions de dollars", "B. 500 millions de dollars", "C. 1 milliard de dollars", "D. 2 milliards de dollars"], "correct": 1, "explanation": "La bonne réponse est B. 500 millions de dollars, car c'est le prix d'acquisition mentionné dans la newsletter."}, {"question": "Quel est le rôle du bilan dans l'analyse financière d'une entreprise ?", "options": ["A. Il montre les revenus et les dépenses sur une période", "B. Il détaille les mouvements de trésorerie", "C. Il fournit une vue instantanée de la situation financière d'une entreprise à une date donnée", "D. Il calcule le bénéfice net"], "correct": 2, "explanation": "La bonne réponse est C. Il fournit une vue instantanée de la situation financière d'une entreprise à une date donnée, car le bilan est un état financier qui présente la situation financière d'une entreprise à un moment précis."}, {"question": "Qu'est-ce que le working capital ?", "options": ["A. La différence entre les actifs et les passifs", "B. La différence entre les actifs circulants et les passifs circulants", "C. Le bénéfice net d'une entreprise", "D. Le chiffre d'affaires d'une entreprise"], "correct": 1, "explanation": "La bonne réponse est B. La différence entre les actifs circulants et les passifs circulants, car le working capital, ou fonds de roulement, représente la différence entre les actifs circulants et les passifs circulants."}, {"question": "Quel est l'impact des tensions géopolitiques sur les marchés financiers ?", "options": ["A. Elles augmentent la confiance des investisseurs", "B. Elles diminuent les coûts pour les entreprises et les consommateurs", "C. Elles n'ont aucun impact sur les marchés financiers", "D. Elles affectent la confiance des investisseurs et augmentent les coûts pour les entreprises et les consommateurs"], "correct": 3, "explanation": "La bonne réponse est D. Elles affectent la confiance des investisseurs et augmentent les coûts pour les entreprises et les consommateurs, car les tensions géopolitiques, notamment les tarifs douaniers, peuvent avoir un impact direct sur les marchés financiers et affecter la confiance des investisseurs et les coûts pour les entreprises et les consommateurs."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
