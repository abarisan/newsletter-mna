<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°10</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°10</h1>
  <p class="subtitle">The Deal Brief · 19 June 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Selon l'analyse du NYT DealBook, quelle est la valorisation de SpaceX évoquée sur le marché secondaire en juin 2026 ?", "options": ["A. 42 Md$", "B. 150 Md$", "C. 350 Md$", "D. 500 Md$"], "correct": 2, "explanation": "La valorisation évoquée est de 350 Md$ sur le marché secondaire selon les tender offers internes. Le chiffre 42 correspond au pourcentage de capital détenu par Musk, pas à la valorisation. Les autres montants ne sont pas mentionnés dans l'article."}, {"question": "Comment Elon Musk conserve-t-il un contrôle quasi-total de SpaceX tout en ne détenant qu'environ 42% du capital ?", "options": ["A. Grâce à une structure d'actions à droits de vote multiples (super-voting shares)", "B. Grâce à un pacte d'actionnaires avec les investisseurs institutionnels", "C. Parce qu'il est l'unique fondateur restant", "D. Parce que les autres actionnaires sont des employés sans droit de vote"], "correct": 0, "explanation": "Musk détient une majorité des droits de vote via une structure d'actions à droits multiples (super-voting shares), ce qui lui donne le contrôle malgré ses 42% du capital. Les autres mécanismes (pacte d'actionnaires, statut de fondateur, employés) ne sont pas ce qui est décrit dans la newsletter."}, {"question": "Quel est le principe fondateur de la consolidation comptable mis en avant dans le cours TRAINY ?", "options": ["A. On consolide selon le pourcentage de détention du capital", "B. On consolide selon le niveau de CONTRÔLE, pas la simple détention", "C. On consolide uniquement les filiales détenues à plus de 50%", "D. On consolide selon le chiffre d'affaires de la filiale"], "correct": 1, "explanation": "Le principe fondateur est que l'on consolide selon le CONTRÔLE et non la simple détention du capital — c'est précisément ce qu'illustre le cas Musk/SpaceX (42% du capital mais contrôle effectif). Penser que tout dépend du pourcentage de détention est qualifié dans le cours d'« erreur n°1 en entretien »."}, {"question": "Quelles sont les trois méthodes de consolidation abordées dans le chapitre ?", "options": ["A. Intégration globale, intégration proportionnelle, mise en équivalence", "B. Coût historique, juste valeur, valeur de marché", "C. Consolidation directe, indirecte, croisée", "D. Goodwill, badwill, écart d'acquisition"], "correct": 0, "explanation": "Les trois méthodes sont l'intégration globale (full), l'intégration proportionnelle (proportionate) et la mise en équivalence (equity method), chacune appliquée selon le niveau de contrôle. Les autres options renvoient à des concepts d'évaluation ou de goodwill, mais ne constituent pas les trois méthodes de consolidation."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
