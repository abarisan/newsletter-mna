<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°06</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°06</h1>
  <p class="subtitle">The Deal Brief · 12 June 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Quel montant SpaceX a-t-il levé lors de son IPO du 12 juin 2026, et quelle valorisation cela lui confère-t-il ?", "options": ["A. $50 milliards levés, valorisation de $1 trillion", "B. $75 milliards levés, valorisation de $1,77 trillion", "C. $75 milliards levés, valorisation de $750 milliards", "D. $100 milliards levés, valorisation de $2 trillion"], "correct": 1, "explanation": "SpaceX a levé $75 milliards (la plus grosse IPO de l'histoire), portant sa valorisation à environ $1,77 trillion. C'est cette levée record qui a fait de Musk le premier trillionaire de l'histoire. Les autres montants (A, C, D) ne correspondent pas aux chiffres rapportés par le FT et le NYT DealBook."}, {"question": "Selon la newsletter, qu'est-ce qu'un Balance Sheet (bilan) mesure ?", "options": ["A. Un flux de revenus et de dépenses sur une période donnée", "B. La rentabilité d'une entreprise sur un exercice", "C. La situation financière d'une entreprise à un instant T", "D. La variation de trésorerie entre deux dates"], "correct": 2, "explanation": "Le bilan est une photographie de la situation financière à un instant T : il indique ce que l'entreprise possède (actifs) et comment elle l'a financé (passifs + capitaux propres). Les réponses A, B et D décrivent plutôt le compte de résultat (qui mesure un flux) ou le tableau des flux de trésorerie, contrairement au bilan qui est une photo statique."}, {"question": "Quelles sont les deux questions auxquelles répond le bilan d'une entreprise ?", "options": ["A. Combien l'entreprise gagne-t-elle et combien dépense-t-elle ?", "B. Qu'est-ce que l'entreprise possède et comment l'a-t-elle financé ?", "C. Quel est le chiffre d'affaires et quelle est la marge nette ?", "D. Quelle est la croissance et quel est le risque de l'entreprise ?"], "correct": 1, "explanation": "Le bilan répond à deux questions clés : « Qu'est-ce que l'entreprise possède ? » (les actifs) et « Comment l'a-t-elle financé ? » (les passifs + capitaux propres). Les autres options renvoient à des concepts de rentabilité ou de performance, qui relèvent du compte de résultat et non du bilan."}, {"question": "En quoi consiste le « grand paradoxe obligations/actions » évoqué par le FT ?", "options": ["A. Les actions et les taux longs baissent simultanément", "B. Les actions atteignent des records pendant que les taux longs remontent", "C. Les obligations deviennent plus attractives que les actions", "D. Les taux courts et les taux longs convergent"], "correct": 1, "explanation": "Le paradoxe décrit par le FT (« The great bond and equity conundrum ») est l'observation simultanée d'actions records (SpaceX, Nasdaq euphorique) et de taux longs qui remontent, ce qui « met sur la tête » la logique financière classique. Les options A, C et D décrivent des configurations qui ne correspondent pas à cette situation paradoxale."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
