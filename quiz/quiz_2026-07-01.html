<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°15</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°15</h1>
  <p class="subtitle">The Deal Brief · 01 July 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Quel est l'objectif principal de la marque japonaise Uniqlo, selon l'article du Financial Times ?", "options": ["A. Réduire sa présence en Asie", "B. Conquérir le marché de la mode mondiale", "C. Se spécialiser dans les vêtements de sport", "D. Développer son e-commerce en Chine"], "correct": 1, "explanation": "L'article du Financial Times mentionne que Uniqlo mise sur son expansion en Europe et en Amérique du Nord pour atteindre ses objectifs, ce qui indique que l'objectif principal de la marque est de conquérir le marché de la mode mondiale."}, {"question": "Qu'est-ce que la valeur de l'action diluée (Diluted Equity Value) ?", "options": ["A. La valeur d'une action avant émission de nouvelles actions", "B. La valeur d'une action après émission de nouvelles actions, reflétant la participation réduite des actionnaires existants", "C. La valeur d'une action en fonction du bénéfice par action", "D. La valeur d'une action en fonction du dividende par action"], "correct": 1, "explanation": "La valeur de l'action diluée prend en compte les actions émises lors d'une augmentation de capital, ce qui peut affecter la participation des actionnaires existants. C'est donc la définition correcte de la Diluted Equity Value."}, {"question": "Qu'est-ce que la méthode du trésorier (Treasury Stock Method) ?", "options": ["A. Une méthode pour évaluer la valeur réelle des actions en considérant les facteurs de dilution", "B. Une méthode pour calculer le bénéfice par action", "C. Une méthode pour déterminer le dividende par action", "D. Une méthode pour évaluer la performance d'une entreprise"], "correct": 0, "explanation": "La méthode du trésorier est utilisée pour évaluer la valeur réelle des actions en considérant les facteurs de dilution, tels que les émissions d'actions, ce qui correspond à la définition correcte."}, {"question": "Pourquoi l'expansion d'Uniqlo peut-elle être vue comme une stratégie pour renforcer sa position sur le marché ?", "options": ["A. Pour réduire sa dépendance à l'égard des marchés locaux", "B. Pour accroître sa résilience face aux aléas économiques", "C. Pour réduire ses coûts de production", "D. Pour augmenter ses ventes en ligne"], "correct": 1, "explanation": "L'expansion d'Uniqlo peut être vue comme une stratégie pour renforcer sa position sur le marché et accroître sa résilience face aux aléas économiques, comme mentionné dans l'article. Cela permet à l'entreprise de diversifier ses revenus et de réduire sa dépendance à l'égard des marchés locaux."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
