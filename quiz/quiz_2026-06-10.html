<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°04</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°04</h1>
  <p class="subtitle">The Deal Brief · 10 June 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Qui compose le consortium menant le LBO record sur Electronic Arts ?", "options": ["A. Blackstone + Vision Fund + Carlyle", "B. Silver Lake + PIF (fonds saoudien) + Affinity Partners", "C. KKR + Mubadala + Apollo", "D. Vanguard + PIF + Thoma Bravo"], "correct": 1, "explanation": "Le consortium est composé de Silver Lake, du PIF (Public Investment Fund saoudien) et d'Affinity Partners, pour un LBO d'environ 55 Md$ de valeur d'entreprise. Les autres combinaisons mélangent des acteurs qui n'interviennent pas dans cette opération."}, {"question": "Pourquoi le 10-K publié par EA est-il qualifié de 'dernier' reporting complet ?", "options": ["A. Parce qu'EA va faire faillite", "B. Parce qu'EA change de référentiel comptable pour passer en IFRS", "C. Parce qu'une fois privée post-closing, EA cessera de déposer ses comptes publics auprès de la SEC", "D. Parce que la SEC supprime l'obligation de reporting pour le secteur du jeu vidéo"], "correct": 2, "explanation": "Une fois le delisting effectif après le closing du LBO, EA deviendra privée et n'aura quasiment plus aucune obligation de publication auprès de la SEC. Ce 10-K est donc le dernier où elle joue selon les règles du disclosure US. EA ne fait pas faillite (A), ne change pas pour l'IFRS (B), et la SEC ne supprime aucune règle sectorielle (D)."}, {"question": "Selon la newsletter, de quoi dépend principalement le niveau de disclosure d'une entreprise ?", "options": ["A. Uniquement de sa taille (chiffre d'affaires)", "B. Du régime (cotée vs privée) et de la géographie (US vs Europe)", "C. Du nombre de salariés et du secteur d'activité", "D. De la volonté discrétionnaire de ses dirigeants"], "correct": 1, "explanation": "La newsletter précise explicitement que le disclosure ne dépend pas seulement de la taille, mais du régime (cotée vs privée) et de la géographie (US vs Europe). La taille seule (A), les effectifs/secteur (C) ou la volonté des dirigeants (D) ne sont pas les critères déterminants évoqués."}, {"question": "Que désigne l'opposition 'US GAAP vs IFRS' évoquée dans le cours ?", "options": ["A. Deux régulateurs boursiers concurrents", "B. Deux types de fonds d'investissement", "C. Deux référentiels (normes) comptables différents", "D. Deux méthodes de valorisation d'un LBO"], "correct": 2, "explanation": "US GAAP et IFRS sont deux référentiels (normes) comptables différents : les deux systèmes ne s'expriment pas dans le même langage comptable. Ce ne sont ni des régulateurs (A), ni des fonds (B), ni des méthodes de valorisation de LBO (D)."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
