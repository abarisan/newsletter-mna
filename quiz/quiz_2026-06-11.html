<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°04</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°04</h1>
  <p class="subtitle">The Deal Brief · 11 June 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Quelle valorisation de référence est discutée pour l'IPO de SpaceX dans les tours secondaires ?", "options": ["A. Environ 35 Md$", "B. Environ 150 Md$", "C. Environ 350 Md$", "D. Environ 1 000 Md$"], "correct": 2, "explanation": "La newsletter indique une valorisation de référence d'environ 350 Md$, ce qui ferait de l'IPO de SpaceX l'une des plus grosses jamais montées. Les autres montants (35, 150 et 1 000 Md$) ne correspondent pas aux chiffres évoqués par le Financial Times et le NYT DealBook."}, {"question": "À quelle question unique le compte de résultat (Income Statement / P&L) répond-il ?", "options": ["A. Combien de liquidités l'entreprise détient-elle à un instant donné ?", "B. L'entreprise a-t-elle gagné ou perdu de l'argent sur une période ?", "C. Quelle est la valeur des actifs de l'entreprise ?", "D. Quel est le niveau d'endettement de l'entreprise ?"], "correct": 1, "explanation": "Le compte de résultat répond à la question : l'entreprise a-t-elle gagné ou perdu de l'argent sur une période donnée ? Les liquidités à un instant donné et la valeur des actifs relèvent du bilan, et l'endettement n'est pas l'objet principal du P&L."}, {"question": "Comment se lit le compte de résultat selon le cours ?", "options": ["A. De bas en haut, en partant du résultat net", "B. De gauche à droite, par catégorie de coûts", "C. De haut en bas, comme un entonnoir, du chiffre d'affaires au résultat net", "D. En commençant par l'EBITDA puis en ajoutant les revenus"], "correct": 2, "explanation": "Le compte de résultat se lit de haut en bas, comme un entonnoir : on part du chiffre d'affaires (le « top line ») et on retire les coûts par couches successives jusqu'au résultat net. Les autres descriptions inversent ou déforment cet ordre de lecture."}, {"question": "Quel facteur explique le relèvement des taux par la BCE selon le signal macro ?", "options": ["A. Une croissance économique trop forte en zone euro", "B. La flambée des prix de l'énergie liée à l'escalade militaire entre les États-Unis et l'Iran", "C. Une baisse du chômage trop rapide", "D. Une crise bancaire en Europe"], "correct": 1, "explanation": "Selon le NYT DealBook et le FT, la BCE s'apprête à relever ses taux pour la première fois depuis septembre 2023 à cause de la flambée des prix de l'énergie provoquée par l'escalade militaire entre les États-Unis et l'Iran. Une croissance forte, une baisse du chômage ou une crise bancaire ne sont pas les causes citées."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
