<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°17</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°17</h1>
  <p class="subtitle">The Deal Brief · 03 July 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Quelle entreprise a annoncé la fermeture des failles qui permettaient l'accès à son modèle d'intelligence artificielle pour les utilisateurs chinois ?", "options": ["A. Google", "B. Anthropic", "C. Microsoft", "D. Amazon"], "correct": 1, "explanation": "La bonne réponse est B. Anthropic, car selon le contenu de la newsletter, c'est cette entreprise qui a annoncé la fermeture des failles pour limiter l'accès chinois à son modèle d'intelligence artificielle Claude. Les autres options sont incorrectes car elles ne correspondent pas à l'information fournie dans la newsletter."}, {"question": "Quelle méthode de valorisation est utilisée pour évaluer la valeur d'une entreprise en comparant avec des entreprises similaires ?", "options": ["A. Valorisation par calcul de flux de trésorerie", "B. Valorisation par comparaison", "C. Valorisation par analyse de ratio", "D. Valorisation par évaluation de risque"], "correct": 1, "explanation": "La bonne réponse est B. Valorisation par comparaison, car selon le contenu de la newsletter, il s'agit d'une méthode de valorisation qui consiste à comparer la valeur d'une entreprise à celle d'entreprises similaires (comparables) pour estimer sa valeur. Les autres options sont incorrectes car elles ne correspondent pas à la définition fournie dans la newsletter."}, {"question": "Quel facteur peut influencer les marchés financiers et la valorisation des entreprises ?", "options": ["A. Les facteurs économiques internes", "B. Les facteurs géopolitiques", "C. Les facteurs environnementaux", "D. Les facteurs sociaux"], "correct": 1, "explanation": "La bonne réponse est B. Les facteurs géopolitiques, car selon le contenu de la newsletter, les facteurs géopolitiques, tels que les tensions entre pays ou les décisions de politique étrangère, peuvent avoir des implications significatives sur les marchés financiers et la valorisation des entreprises. Les autres options sont incorrectes car elles ne correspondent pas à l'information fournie dans la newsletter."}, {"question": "Pourquoi est-il important de prendre en compte les facteurs spécifiques à chaque entreprise et à son environnement lors de la valorisation ?", "options": ["A. Pour simplifier la valorisation", "B. Pour réduire les coûts", "C. Pour améliorer la précision de la valorisation", "D. Pour accélérer le processus de valorisation"], "correct": 2, "explanation": "La bonne réponse est C. Pour améliorer la précision de la valorisation, car selon le contenu de la newsletter, il est crucial de prendre en compte les facteurs spécifiques à chaque entreprise et à son environnement pour obtenir une valorisation plus précise. Les autres options sont incorrectes car elles ne correspondent pas à l'objectif de prende en compte ces facteurs."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
