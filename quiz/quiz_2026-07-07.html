<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°19</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°19</h1>
  <p class="subtitle">The Deal Brief · 07 July 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Quel est le concept financier utilisé comme référence pour évaluer la valorisation d'un deal ?", "options": ["A. Analyse de sensibilité", "B. Precedent Transactions", "C. Modèle de croissance", "D. Analyse de risque"], "correct": 1, "explanation": "Les Precedent Transactions sont des transactions précédentes similaires utilisées comme référence pour évaluer la valorisation d’un deal. Cette approche permet de prendre en compte les tendances du marché et les facteurs macro-économiques qui influencent les valorisations."}, {"question": "Quel est le montant approximatif généré par les entreprises de transport maritime grecques, telles que Dynacom Tankers, en transportant du pétrole russe sous le régime de plafonnement des prix de la G7 ?", "options": ["A. 1 milliard de dollars", "B. 2 milliards de dollars", "C. 4 milliards de dollars", "D. 6 milliards de dollars"], "correct": 2, "explanation": "Selon l'article, les entreprises de transport maritime grecques, telles que Dynacom Tankers, ont généré près de 4 milliards de dollars en trois ans en transportant du pétrole russe sous le régime de plafonnement des prix de la G7."}, {"question": "Quels indicateurs financiers sont considérés dans l'analyse de la mécanique des Precedent Transactions ?", "options": ["A. Seulement le chiffre d'affaires", "B. Seulement les flux de trésorerie disponibles", "C. Les multiples de valorisation tels que l'EBITDA, les flux de trésorerie disponibles et d'autres indicateurs financiers pertinents", "D. Seulement les coûts d'exploitation"], "correct": 2, "explanation": "La mécanique des Precedent Transactions implique l’analyse de la valorisation des sociétés ciblées dans les deals précédents, en considérant les multiples de valorisation tels que l'EBITDA, les flux de trésorerie disponibles (Free Cash Flow) et d’autres indicateurs financiers pertinents."}, {"question": "Quel facteur géopolitique est susceptible d'influencer les marchés financiers et les décisions d'investissement ?", "options": ["A. Les tensions entre l'Union européenne et les États-Unis", "B. Les tensions entre l'Ukraine et la Russie", "C. Les élections présidentielles américaines", "D. Les changements climatiques"], "correct": 1, "explanation": "La situation géopolitique actuelle, avec des tensions entre l'Ukraine et la Russie, influencera probablement les marchés financiers et les décisions d’investissement."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
