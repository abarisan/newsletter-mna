<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°02</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°02</h1>
  <p class="subtitle">The Deal Brief · 06 June 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Dans le rachat d'Electronic Arts, quel est le levier cible communiqué lors de la pré-syndication de la dette menée par JPMorgan ?", "options": ["A. Environ 2,0–2,5x l'EBITDA", "B. Environ 5,0–5,5x l'EBITDA", "C. Environ 8,0–8,5x l'EBITDA", "D. Environ 10,0–10,5x l'EBITDA"], "correct": 1, "explanation": "La newsletter indique que les banques d'arrangement ont commencé à pré-syndiquer le package de dette avec un levier cible autour de 5,0–5,5x l'EBITDA. Les options A, C et D sont incorrectes : un levier de 2,0–2,5x serait inhabituellement bas pour un LBO de cette taille, tandis que 8x ou 10x dépasseraient largement le niveau effectivement annoncé pour ce deal."}, {"question": "Quelle est la première des 4 briques d'un LBO model selon le cours ?", "options": ["A. Le calcul du TRI (taux de rendement interne)", "B. La projection de l'EBITDA sur 5 ans", "C. Le tableau Sources & Uses", "D. La structure de gouvernance post-acquisition"], "correct": 2, "explanation": "Le cours présente le tableau « Sources & Uses » comme la première brique : il indique d'où vient l'argent (dette + equity) et où il va (prix d'achat + frais + refinancement de dette existante). Le TRI et la projection d'EBITDA sont des éléments du modèle mais interviennent dans d'autres briques, et la gouvernance n'est pas listée parmi les 4 briques techniques du LBO model."}, {"question": "Sur la base des chiffres EA (EBITDA estimé ~2,4 Md$, levier ~5x), à combien s'élève approximativement la dette levée, et comment qualifier le deal ?", "options": ["A. ~12–13 Md$ de dette, un deal « equity-heavy »", "B. ~40 Md$ de dette, un deal « debt-heavy »", "C. ~55 Md$ de dette, un deal entièrement financé par effet de levier", "D. ~2,4 Md$ de dette, un deal sans equity"], "correct": 0, "explanation": "Avec un levier ~5x appliqué à un EBITDA ~2,4 Md$, on obtient environ 12–13 Md$ de dette. Le reste (~40 Md$+) provenant de l'equity du consortium, ce ticket equity massif fait de l'opération un deal « equity-heavy ». Les options B et C confondent le montant de dette avec la part equity ou la valeur totale (~55 Md$), et D ignore l'apport en equity dominant."}, {"question": "Lors de sa réunion de mai 2026, quelle décision la Fed a-t-elle prise et quel en est l'effet sur le financement LBO ?", "options": ["A. Elle a baissé les taux à 2 %, réduisant fortement le coût de la dette", "B. Elle a maintenu les taux à 4,00 %–4,25 %, gardant le coût de la dette collant", "C. Elle a relevé les taux à 6 %, rendant tout LBO impossible", "D. Elle a supprimé le taux directeur au profit du seul SOFR"], "correct": 1, "explanation": "La Fed a maintenu le taux directeur dans la fourchette 4,00 %–4,25 %, repoussant les espoirs de détente rapide. De ce fait, le SOFR reste élevé (autour de 4,3 %) et le coût de la dette LBO reste « collant ». Les autres options sont fausses : il n'y a eu ni baisse à 2 %, ni hausse à 6 %, ni suppression du taux directeur."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
