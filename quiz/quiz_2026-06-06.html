<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — The Deal Brief N°02</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #2b1a0e;
           margin: 0; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; color: #e85d1a; margin-bottom: 4px; }
    .subtitle { color: #7a5c45; font-size: 13px; margin-bottom: 40px; }
    .question { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px;
                 box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .question h3 { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
    .option { display: block; width: 100%; text-align: left; background: #fff8f2;
               border: 1px solid #fde0c5; border-radius: 6px; padding: 12px 16px;
               margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .option:hover { background: #fff3e8; border-color: #f9a06b; }
    .option.correct { background: #e6f9ec; border-color: #2ecc71; color: #1a6b3a; }
    .option.wrong   { background: #fdecea; border-color: #e74c3c; color: #7b1c1c; }
    .explanation { display: none; margin-top: 12px; padding: 12px 16px; background: #fff3e8;
                    border-left: 3px solid #e85d1a; font-size: 13px; color: #5a3520;
                    border-radius: 0 6px 6px 0; line-height: 1.6; }
    .score { display: none; text-align: center; padding: 32px; background: #fff;
              border-radius: 8px; box-shadow: 0 2px 8px rgba(232,93,26,0.08); }
    .score h2 { font-size: 28px; color: #e85d1a; }
    .score p { color: #5a3520; }
    #submit { display: block; width: 100%; padding: 16px; background: #e85d1a; color: #fff;
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #submit:hover { background: #c94e0e; }
  </style>
</head>
<body>
<div class="container">
  <h1>Quiz — N°02</h1>
  <p class="subtitle">The Deal Brief · 06 June 2026 · 4 questions</p>
  <div id="quiz"></div>
  <button id="submit" onclick="submitQuiz()">Voir mes résultats</button>
  <div class="score" id="score"></div>
</div>
<script>
const questions = [{"question": "Quel est le montant approximatif de la valeur d'entreprise du rachat d'Electronic Arts par le consortium mené par Silver Lake ?", "options": ["A. 20 Md$", "B. 35 Md$", "C. 55 Md$", "D. 75 Md$"], "correct": 2, "explanation": "La valeur d'entreprise du deal EA/Silver Lake est d'environ 55 Md$, ce qui en fait le plus gros LBO de l'histoire. Les 20 Md$ correspondent à la dette du financement, et les 35 Md$ à l'equity apportée par le consortium. 75 Md$ n'est mentionné nulle part dans la newsletter."}, {"question": "Dans le cas EA simplifié, quel est le multiple d'entrée (EV/EBITDA) du deal ?", "options": ["A. 8x", "B. 14x", "C. 22x", "D. 28x"], "correct": 2, "explanation": "Le multiple d'entrée se calcule en divisant la valeur d'entreprise (55 Md$) par l'EBITDA d'entrée (2,5 Md$), soit 55 / 2,5 = 22x. Ce multiple élevé est typique d'un actif premium. Les autres valeurs ne correspondent pas à ce calcul."}, {"question": "Selon la mécanique du LBO décrite, comment se crée principalement la valeur pour le sponsor à la sortie ?", "options": ["A. Par l'augmentation du nombre d'employés de la cible", "B. Par le désendettement progressif financé par les cash-flows de la cible", "C. Par l'émission de nouvelles actions sur le marché", "D. Par la réduction du multiple de valorisation"], "correct": 1, "explanation": "Dans un LBO, le sponsor achète la cible avec peu d'equity et beaucoup de dette, puis utilise les cash-flows de la cible pour rembourser cette dette. Le désendettement au fil du temps crée la valeur à la sortie. L'augmentation du nombre d'employés (A) et l'émission d'actions (C) ne sont pas des mécanismes de création de valeur du LBO, et une réduction du multiple (D) détruirait au contraire de la valeur."}, {"question": "Quelle décision la Réserve fédérale a-t-elle prise lors de sa réunion de fin mai 2026 ?", "options": ["A. Elle a relevé ses taux à 5,00 %–5,25 %", "B. Elle a maintenu son taux directeur dans la fourchette 3,75 %–4,00 %", "C. Elle a baissé immédiatement ses taux de 0,50 %", "D. Elle a suspendu toute communication sur ses intentions futures"], "correct": 1, "explanation": "La Fed a maintenu son taux directeur dans la fourchette 3,75 %–4,00 %, tout en signalant via les dot plots qu'une baisse supplémentaire restait possible au second semestre si l'inflation cœur continuait sa décrue. Elle n'a ni relevé (A) ni baissé immédiatement (C) ses taux, et a au contraire communiqué ses intentions futures via les dot plots (D)."}];
let answered = {};

function buildQuiz() {
  const quiz = document.getElementById('quiz');
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${qi+1}. ${q.question}</h3>` +
      q.options.map((o, oi) =>
        `<button class="option" id="q${qi}_${oi}" onclick="answer(${qi},${oi},${q.correct})">${o}</button>`
      ).join('') +
      `<div class="explanation" id="exp${qi}">${q.explanation}</div>`;
    quiz.appendChild(div);
  });
}

function answer(qi, oi, correct) {
  if (answered[qi] !== undefined) return;
  answered[qi] = oi;
  const btn = document.getElementById(`q${qi}_${oi}`);
  const correctBtn = document.getElementById(`q${qi}_${correct}`);
  btn.classList.add(oi === correct ? 'correct' : 'wrong');
  if (oi !== correct) correctBtn.classList.add('correct');
  document.getElementById(`exp${qi}`).style.display = 'block';
}

function submitQuiz() {
  const score = Object.values(answered).filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const msg = score === total ? "🏆 Parfait ! Tu maîtrises ce numéro." :
              score >= total/2 ? "👍 Bien, relis les explications des questions ratées." :
              "📖 Relis le cours — ces notions vont revenir en entretien.";
  document.getElementById('score').innerHTML =
    `<h2>${score} / ${total}</h2><p>${msg}</p>`;
  document.getElementById('score').style.display = 'block';
  document.getElementById('submit').style.display = 'none';
  window.scrollTo(0, document.getElementById('score').offsetTop - 20);
}

buildQuiz();
</script>
</body>
</html>
